</head>
<body>
    <h1>JavaScript Conditional Statements</h1>
    <button class="btn" onclick="checkAge()"></button>

    <script>
        function checkAge(){
        if(19 < 18){
            alert("You're underage.");
        }
        else if(21 > 18){
            alert("You're legal of age.");
        }
        else {
            alert("Your age could not be classified.");
        }
    }
    </script>
    
</body>
</html>
